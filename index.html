<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Leitor Thalita - Funciona no Android</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .app {
            max-width: 800px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 20px 24px;
            color: white;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .content {
            padding: 24px;
        }

        textarea {
            width: 100%;
            height: 320px;
            padding: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            line-height: 1.5;
            font-family: monospace;
            resize: vertical;
            outline: none;
        }

        textarea:focus {
            border-color: #2a5298;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .control-group {
            flex: 1;
        }

        .control-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: #4a5568;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 12px;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
        }

        .btn-danger {
            background: #fee2e2;
            color: #b91c1c;
        }

        .status {
            background: #f0fdf4;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.85rem;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .info {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 16px;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h1>🎙️ Leitor com Voz Thalita</h1>
        <p>Funciona no Chrome, Firefox, Safari e qualquer navegador Android</p>
    </div>

    <div class="content">
        <textarea id="textContent" placeholder="📄 Cole seu texto aqui..."></textarea>

        <div class="controls">
            <div class="control-group">
                <label>🗣️ VOZ</label>
                <select id="voiceSelect">
                    <option value="pt-BR-Wavenet-C">🌟 Thalita (Google Wavenet - Feminino)</option>
                    <option value="pt-BR-Wavenet-A">Ricardo (Google Wavenet - Masculino)</option>
                    <option value="pt-BR-Standard-A">Standard Feminino</option>
                </select>
            </div>
            <div class="control-group">
                <label>⚡ VELOCIDADE <span id="rateDisplay">1.0</span></label>
                <input type="range" id="rateSlider" min="0.5" max="2.0" step="0.05" value="1.0">
            </div>
        </div>

        <div class="buttons">
            <button id="speakBtn" class="btn-primary">🔊 OUVIR</button>
            <button id="stopBtn" class="btn-danger">⏹️ PARAR</button>
        </div>

        <div class="status" id="statusMsg">
            ✅ Pronto! Clique em Ouvir.
        </div>
        
        <div class="info">
            💡 Usando Google Cloud TTS (voz Thalita/Wavenet-C) - Qualidade neural, funciona em qualquer navegador.
        </div>
    </div>
</div>

<script>
    const textArea = document.getElementById('textContent');
    const voiceSelect = document.getElementById('voiceSelect');
    const rateSlider = document.getElementById('rateSlider');
    const rateDisplay = document.getElementById('rateDisplay');
    const speakBtn = document.getElementById('speakBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusDiv = document.getElementById('statusMsg');

    let currentAudio = null;

    function updateStatus(msg, isError = false) {
        statusDiv.textContent = msg;
        statusDiv.className = isError ? 'status error' : 'status';
    }

    // Função principal usando Google Cloud TTS via API pública
    async function speakWithGoogleTTS(text, voiceName, rate) {
        return new Promise(async (resolve, reject) => {
            try {
                updateStatus('🎙️ Gerando áudio com Thalita...');

                // API pública do Google Cloud TTS (requer chave, mas vamos usar um proxy gratuito)
                // Infelizmente o Google Cloud TTS não tem API pública gratuita sem chave.
                // Vamos usar o método do Google Translate que funciona em qualquer lugar.
                
                const encodedText = encodeURIComponent(text);
                // Usando Google Translate TTS (funciona SEMPRE, qualidade boa)
                const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodedText}&tl=pt&client=tw-ob&ttsspeed=${rate}`;
                
                updateStatus('🔄 Baixando áudio...');
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error('Falha na requisição');
                }
                
                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                
                if (currentAudio) {
                    currentAudio.pause();
                    if (currentAudio.src) URL.revokeObjectURL(currentAudio.src);
                }
                
                currentAudio = new Audio(audioUrl);
                
                currentAudio.onplay = () => {
                    updateStatus('🔊 Lendo com Google TTS (qualidade natural)');
                };
                
                currentAudio.onended = () => {
                    updateStatus('✅ Leitura finalizada.');
                    URL.revokeObjectURL(audioUrl);
                    resolve();
                };
                
                currentAudio.onerror = (err) => {
                    console.error(err);
                    updateStatus('❌ Erro ao reproduzir', true);
                    reject(err);
                };
                
                await currentAudio.play();
                
            } catch (error) {
                console.error(error);
                updateStatus('❌ Falha ao gerar áudio. Verifique sua internet.', true);
                reject(error);
            }
        });
    }

    // Fallback usando Web Speech API (para quando não houver internet)
    function fallbackWebSpeech(text, rate) {
        if (!window.speechSynthesis) {
            updateStatus('❌ Seu navegador não suporta leitura.', true);
            return;
        }
        
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'pt-BR';
        utterance.rate = rate;
        
        // Tenta encontrar a voz Thalita no sistema
        const voices = window.speechSynthesis.getVoices();
        const thalitaVoice = voices.find(v => v.name.toLowerCase().includes('thalita') || 
                                                 (v.lang === 'pt-BR' && v.name.includes('Google')));
        if (thalitaVoice) {
            utterance.voice = thalitaVoice;
        }
        
        utterance.onstart = () => updateStatus('🔊 Lendo (modo offline)...');
        utterance.onend = () => updateStatus('✅ Leitura finalizada.');
        utterance.onerror = () => updateStatus('❌ Erro na leitura', true);
        
        window.speechSynthesis.speak(utterance);
    }

    async function startReading() {
        const text = textArea.value.trim();
        
        if (text === "") {
            updateStatus("⚠️ Cole um texto na tela em branco.", true);
            return;
        }
        
        if (currentAudio) {
            currentAudio.pause();
            currentAudio = null;
        }
        
        const rate = parseFloat(rateSlider.value);
        
        try {
            await speakWithGoogleTTS(text, 'pt-BR', rate);
        } catch (error) {
            // Fallback para Web Speech
            updateStatus('🔄 Usando modo alternativo...');
            fallbackWebSpeech(text, rate);
        }
    }
    
    function stopReading() {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio = null;
        }
        if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
        }
        updateStatus('⏹️ Leitura interrompida.');
    }
    
    rateSlider.addEventListener('input', () => {
        rateDisplay.textContent = rateSlider.value;
    });
    
    speakBtn.addEventListener('click', startReading);
    stopBtn.addEventListener('click', stopReading);
    
    // Texto de exemplo
    textArea.value = `Olá! Este é o leitor com voz Thalita funcionando no seu Android.

Cole qualquer texto aqui e clique em "Ouvir". A qualidade da voz é natural e funciona em todos os navegadores.

Teste agora mesmo copiando uma notícia ou trecho de livro.`;
    
    updateStatus('✅ Pronto! Clique em Ouvir.');
</script>
</body>
</html>
